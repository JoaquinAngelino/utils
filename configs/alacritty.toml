[window]
opacity = 0.96
dynamic_padding = true
decorations = "full"
# startup_mode = "Windowed"
dynamic_title = true

[font]
size = 13

[font.normal]
family = "DejaVuSansMNerdFont"
style = "Regular"

[font.bold]
family = "DejaVuSansMNerdFont"
style = "Bold"

[font.italic]
family = "DejaVuSansMNerdFont"
style = "Italic"

[font.bold_italic]
family = "DejaVuSansMNerdFont"
style = "Bold Italic"

# Claude — dark theme
# Inspired by Claude's UI palette: deep navy bg, blue-tinted fg,
# soft purples, corals, teals, and warm accents.
 
[colors.primary]
background = "0x0d1117"   # deep github-dark navy (Claude's dark canvas)
foreground = "0xe6edf3"   # near-white with a blue-grey tint
 
[colors.cursor]
text    = "0x0d1117"      # background
cursor  = "0xe6edf3"      # foreground (clean contrast)
 
[colors.selection]
text       = "0x0d1117"   # background
background = "0x388bfd"   # Claude accent blue
 
[colors.normal]
black   = "0x21262d"      # dark surface
red     = "0xff7b72"      # coral-red  (Claude warning/error tone)
green   = "0x7ee787"      # soft green (success)
yellow  = "0xf0883e"      # warm amber
blue    = "0x79c0ff"      # Claude accent blue
magenta = "0xd2a8ff"      # soft purple (Claude's lavender)
cyan    = "0x56d364"      # bright teal-green
white   = "0xb1bac4"      # muted text
 
[colors.bright]
black   = "0x30363d"      # slightly lighter surface
red     = "0xffa198"      # lighter coral
green   = "0xaff5b4"      # lighter green
yellow  = "0xffb757"      # lighter amber
blue    = "0xa5d6ff"      # lighter blue  (Claude link/string tone)
magenta = "0xefbfff"      # lighter lavender
cyan    = "0x7ee787"      # lighter teal
white   = "0xe6edf3"      # full bright fg
 
[cursor]
style          = { shape = "Block", blinking = "On" }
vi_mode_style  = { shape = "Beam",  blinking = "Off" }
blink_interval = 500

[selection]
save_to_clipboard = true

# [bell]
# animation = "EaseOutExpo"
# duration = 80

[scrolling]
history = 5000
multiplier = 5

[mouse]
hide_when_typing = false

[keyboard]
bindings = [
  { key = "C", mods = "Control|Shift", action = "Copy" },
  { key = "V", mods = "Control|Shift", action = "Paste" },
  { key = "N", mods = "Control|Shift", action = "SpawnNewInstance" },
  { key = "PageUp", mods = "Shift", action = "ScrollPageUp" },
  { key = "PageDown", mods = "Shift", action = "ScrollPageDown" },
  { key = "Space", mods = "Control|Shift", action = "ToggleViMode" },
  { key = "Return", mods = "Shift", chars = "\u001B\r" }
]

[debug]
render_timer = false
persistent_logging = false
log_level = "Warn"

[env]
# TERM = "alacritty"
TERM = "xterm-256color"
